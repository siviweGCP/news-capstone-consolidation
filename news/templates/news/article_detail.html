<!DOCTYPE html>
<html>
<head>
    <title>{{ article.title }}</title>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">Home</a> |
        <a href="{% url 'article_list' %}">Back to Articles</a>
    </nav>

    <hr>

    <h1>{{ article.title }}</h1>

    <p>
        Author: {{ article.author.username }}
        {% if article.publisher %}
            | Publisher: {{ article.publisher.name }}
        {% endif %}
        | Approved: {{ article.approved }}
    </p>

    <hr>

    <p>{{ article.content }}</p>
</body>
</html>
