<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>News Application</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f4;
        }

        nav {
            background: #222;
            padding: 12px;
            margin-bottom: 20px;
        }

        nav a {
            color: white;
            margin-right: 14px;
            text-decoration: none;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
        }

        .message {
            padding: 10px;
            background: #e8f4ff;
            border-left: 4px solid #0077cc;
            margin-bottom: 10px;
        }

        input,
        select,
        textarea {
            width: 100%;
            max-width: 650px;
            padding: 8px;
            margin-top: 4px;
        }

        button,
        .button {
            background: #0077cc;
            color: white;
            border: none;
            padding: 9px 14px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
        }

        .danger {
            background: #b00020;
        }
    </style>
</head>

<body>
    <nav>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'article_list' %}">Articles</a>
        <a href="{% url 'newsletter_list' %}">Newsletters</a>

        {% if user.is_authenticated %}
            <a href="{% url 'article_create' %}">Create Article</a>
            <a href="{% url 'article_review_list' %}">Review Articles</a>
            <a href="{% url 'publisher_list' %}">Publishers</a>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'register' %}">Register</a>
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
