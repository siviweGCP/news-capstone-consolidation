<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>
    <h1>Create Account</h1>

    <nav>
        <a href="{% url 'home' %}">Home</a> |
        <a href="{% url 'article_list' %}">Articles</a> |
        <a href="{% url 'login' %}">Login</a>
    </nav>

    <hr>

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Register</button>
    </form>
</body>
</html>
