<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>

    <nav>
        <a href="{% url 'home' %}">Home</a> |
        <a href="{% url 'article_list' %}">Articles</a> |
        <a href="{% url 'register' %}">Register</a>
    </nav>

    <hr>

    {% if form.errors %}
        <p>Your username and password did not match. Please try again.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>
</body>
</html>
